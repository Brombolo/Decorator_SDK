# ═══════════════════════════════════════════════════════════════════════════════
#  Tema preset: "ClassicBeOS"
#  Richiama il look originale BeOS R4/R5 con tab giallo e bordi a bevel.
# ═══════════════════════════════════════════════════════════════════════════════

[meta]
name    = "ClassicBeOS"
author  = ""
version = "1.0"

[tab]
height        = 20
font_size     = 11
font_bold     = true
shape         = "flat"
corner_radius = 0
slant_angle   = 15

[tab.active]
color_start   = "#ffcb00"
color_end     = "#e8b400"
text_color    = "#000000"
border_color  = "#a07800"

[tab.inactive]
color_start   = "#e8e8e8"
color_end     = "#d0d0d0"
text_color    = "#606060"
border_color  = "#a8a8a8"

[tab.stack_tile]
color_start     = "#f0c000"
color_end       = "#d8aa00"
text_color      = "#000000"
indicator_color = "#ff6020"

[tab.effect]
type            = "gradient"
gradient_dir    = "vertical"
glass_opacity   = 0.20
tint_amount     = 0.10
inner_glow      = false
inner_glow_color= "#ffffff44"
separator_line  = false
separator_color = ""

[border]
width  = 5
style  = "beveled"

[border.active]
color_base      = "#c8c8c8"
color_highlight = "#ffffff"
color_shadow    = "#606060"

[border.inactive]
color_base      = "#d0d0d0"
color_highlight = ""
color_shadow    = ""

[border.corners]
radius     = 0
anti_alias = true

[buttons]
size     = 13
margin   = 5
spacing  = 4
position = "left"
shape    = "square"
corner_radius = 2

[buttons.icon]
style        = "classic_be"
scale        = 0.60
stroke_width = 1.0

[buttons.close]
color_normal  = "#ffcb00"
color_hover   = "#ffe040"
color_pressed = "#d0a000"
icon_color    = "#000000"

[buttons.zoom]
color_normal  = "#ffcb00"
color_hover   = "#ffe040"
color_pressed = "#d0a000"
icon_color    = "#000000"

[buttons.hover_effect]
type         = "lighten"
scale_factor = 1.05

[resize_corner]
style = "knob"
size  = 18
color = ""

[title]
alignment    = "left"
shadow       = false
shadow_color = "#00000033"
truncation   = "end"

[floating]
tab_height   = 14
border_width = 3
tab_color    = ""

[rendering]
scale_with_dpi = true
min_tab_height = 16
