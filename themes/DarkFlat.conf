# ═══════════════════════════════════════════════════════════════════════════════
#  Tema preset: "DarkFlat"
#  Ispirato allo stile FlatDecorator di unarix — toni scuri e bordi sottili.
#  Copia il contenuto nel tuo theme.conf per usarlo come punto di partenza.
# ═══════════════════════════════════════════════════════════════════════════════

[meta]
name    = "DarkFlat"
author  = ""
version = "1.0"

[tab]
height        = 20
font_size     = 11
font_bold     = false
shape         = "flat"
corner_radius = 0
slant_angle   = 15

[tab.active]
color_start   = "#2d2d2d"
color_end     = "#1e1e1e"
text_color    = "#e8e8e8"
border_color  = "#111111"

[tab.inactive]
color_start   = "#404040"
color_end     = "#363636"
text_color    = "#909090"
border_color  = "#282828"

[tab.stack_tile]
color_start     = "#383838"
color_end       = "#2a2a2a"
text_color      = "#c0c0c0"
indicator_color = "#e8a020"

[tab.effect]
type            = "gradient"
gradient_dir    = "vertical"
glass_opacity   = 0.10
tint_amount     = 0.10
inner_glow      = false
inner_glow_color= "#ffffff22"
separator_line  = true
separator_color = "#111111"

[border]
width  = 4
style  = "flat"

[border.active]
color_base      = "#2a2a2a"
color_highlight = ""
color_shadow    = ""

[border.inactive]
color_base      = "#383838"
color_highlight = ""
color_shadow    = ""

[border.corners]
radius     = 0
anti_alias = true

[buttons]
size     = 11
margin   = 4
spacing  = 3
position = "left"
shape    = "circle"
corner_radius = 3

[buttons.icon]
style        = "symbol"
scale        = 0.55
stroke_width = 1.2

[buttons.close]
color_normal  = "#c0392b"
color_hover   = "#e74c3c"
color_pressed = "#922b21"
icon_color    = "#ffffff"

[buttons.zoom]
color_normal  = "#27ae60"
color_hover   = "#2ecc71"
color_pressed = "#1e8449"
icon_color    = "#ffffff"

[buttons.hover_effect]
type         = "lighten"
scale_factor = 1.08

[resize_corner]
style = "knob"
size  = 18
color = ""

[title]
alignment    = "center"
shadow       = false
shadow_color = "#00000066"
truncation   = "end"

[floating]
tab_height   = 13
border_width = 2
tab_color    = ""

[rendering]
scale_with_dpi = true
min_tab_height = 16
