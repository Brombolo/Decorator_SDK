# ═══════════════════════════════════════════════════════════════════════════════
#  Tema preset: "ArcLight"
#  Stile moderno chiaro — bordi sottili, pulsanti colorati, tab con glass.
# ═══════════════════════════════════════════════════════════════════════════════

[meta]
name    = "ArcLight"
author  = ""
version = "1.0"

[tab]
height        = 24
font_size     = 12
font_bold     = false
shape         = "rounded"
corner_radius = 5
slant_angle   = 15

[tab.active]
color_start   = "#5294e2"
color_end     = "#3a7bd5"
text_color    = "#ffffff"
border_color  = "#2a6bbf"

[tab.inactive]
color_start   = "#d3dae3"
color_end     = "#c4cdd8"
text_color    = "#5a6a7a"
border_color  = "#aabbc8"

[tab.stack_tile]
color_start     = "#4a84d2"
color_end       = "#3a74c2"
text_color      = "#e8f0ff"
indicator_color = "#ffcc00"

[tab.effect]
type            = "glass"
gradient_dir    = "vertical"
glass_opacity   = 0.18
tint_amount     = 0.12
inner_glow      = true
inner_glow_color= "#ffffff38"
separator_line  = true
separator_color = ""

[border]
width  = 3
style  = "flat"

[border.active]
color_base      = "#5294e2"
color_highlight = ""
color_shadow    = ""

[border.inactive]
color_base      = "#c4cdd8"
color_highlight = ""
color_shadow    = ""

[border.corners]
radius     = 3
anti_alias = true

[buttons]
size     = 13
margin   = 5
spacing  = 4
position = "left"
shape    = "circle"
corner_radius = 3

[buttons.icon]
style        = "symbol"
scale        = 0.55
stroke_width = 1.5

[buttons.close]
color_normal  = "#ed5a5a"
color_hover   = "#f07070"
color_pressed = "#c03030"
icon_color    = "#ffffff"

[buttons.zoom]
color_normal  = "#50c060"
color_hover   = "#60d070"
color_pressed = "#309040"
icon_color    = "#ffffff"

[buttons.hover_effect]
type         = "glow"
scale_factor = 1.10

[resize_corner]
style = "lines"
size  = 18
color = ""

[title]
alignment    = "center"
shadow       = true
shadow_color = "#00000033"
truncation   = "middle"

[floating]
tab_height   = 16
border_width = 2
tab_color    = ""

[rendering]
scale_with_dpi = true
min_tab_height = 18
