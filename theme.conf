# ═══════════════════════════════════════════════════════════════════════════════
#  Haiku Decorator SDK  ·  theme.conf
#  ─────────────────────────────────────────────────────────────────────────────
#  Questo è l'UNICO file che devi modificare per creare il tuo decorator.
#  Sintassi: TOML  (chiave = valore, commenti con #)
#  Colori: #RRGGBB oppure #RRGGBBAA  (AA = opacità, 00=trasparente FF=opaco)
#  Pixel: numeri interi  |  Opacità/scala: decimali tra 0.0 e 1.0
# ═══════════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────────
#  META  —  Informazioni sul decorator
# ───────────────────────────────────────────────────────────────────────────────
[meta]
name    = "MyDecorator"    # Nome senza spazi (diventa il nome del file .so)
author  = ""               # Il tuo nome (opzionale)
version = "1.0"


# ═══════════════════════════════════════════════════════════════════════════════
#  TAB  —  La barra del titolo della finestra
# ═══════════════════════════════════════════════════════════════════════════════

[tab]
height        = 22          # Altezza in pixel          (min 14, max 48)
font_size     = 12          # Dimensione testo titolo   (8–18)
font_bold     = false       # true = grassetto

# Forma del tab
# Valori: "flat" | "rounded" | "slanted"
shape         = "flat"
corner_radius = 0           # Arrotondamento angoli  (0–12, solo se shape="rounded")
slant_angle   = 15          # Inclinazione laterale in gradi  (5–45, solo se shape="slanted")

# ─── Colori tab finestra ATTIVA (in focus) ────────────────────────────────────
[tab.active]
color_start   = "#3a5f8a"   # Colore principale (o inizio gradiente)
color_end     = "#2b4a6f"   # Fine gradiente — uguale a color_start = colore piatto
text_color    = "#ffffff"
border_color  = "#1a3a5a"

# ─── Colori tab finestra INATTIVA ─────────────────────────────────────────────
[tab.inactive]
color_start   = "#606060"
color_end     = "#505050"
text_color    = "#c0c0c0"
border_color  = "#404040"

# ─── Colori tab in Stack & Tile (raggruppamento Haiku) ────────────────────────
[tab.stack_tile]
color_start     = "#4a7a9b"
color_end       = "#3a6a8b"
text_color      = "#e0e0e0"
indicator_color = "#f0c040"   # Piccolo indicatore visivo dello stack

# ─── Effetto visivo del tab ───────────────────────────────────────────────────
# type: "none" | "gradient" | "glass" | "texture" | "tint_from_system"
[tab.effect]
type            = "gradient"
gradient_dir    = "vertical"    # "vertical" | "horizontal" | "diagonal"
glass_opacity   = 0.25          # Intensità effetto glass  (0.0–1.0)
tint_amount     = 0.15          # Intensità tint sistema   (0.0–1.0)
inner_glow      = false         # Luce interna sul bordo superiore
inner_glow_color= "#ffffff44"
separator_line  = true          # Linea separazione tab/contenuto
separator_color = ""            # Vuoto = auto (derivato da color_start)

# ─── Texture del tab (solo se effect.type = "texture") ───────────────────────
[tab.texture]
file            = ""            # Percorso immagine PNG relativo a theme.conf
tile            = true          # true=tiled  false=stretched
blend_mode      = "multiply"    # "multiply" | "overlay" | "screen" | "normal"
opacity         = 0.4


# ═══════════════════════════════════════════════════════════════════════════════
#  BORDI  —  La cornice attorno al contenuto della finestra
# ═══════════════════════════════════════════════════════════════════════════════

[border]
width  = 5              # Spessore totale in pixel  (1–12)
# style: "flat" | "beveled" | "inset" | "shadow"
style  = "beveled"

[border.active]
color_base      = "#3a5f8a"   # Il sistema calcola automaticamente highlight e shadow
color_highlight = ""          # Vuoto = auto  (tono più chiaro di color_base)
color_shadow    = ""          # Vuoto = auto  (tono più scuro di color_base)

[border.inactive]
color_base      = "#505050"
color_highlight = ""
color_shadow    = ""

[border.corners]
radius     = 0          # Arrotondamento angoli del frame  (0–8)
anti_alias = true


# ═══════════════════════════════════════════════════════════════════════════════
#  PULSANTI  —  Close e Zoom nella tab
# ═══════════════════════════════════════════════════════════════════════════════

[buttons]
size     = 12           # Dimensione quadrata in pixel  (8–20)
margin   = 5            # Distanza dal bordo del tab
spacing  = 4            # Spazio tra i due pulsanti
# position: "left" | "right"
position = "left"
# shape: "circle" | "square" | "rounded_square" | "diamond"
shape    = "circle"
corner_radius = 3       # Solo se shape = "rounded_square"  (0–8)

# ─── Icona disegnata sopra il pulsante ────────────────────────────────────────
[buttons.icon]
# style: "symbol" | "dot" | "cross_x" | "classic_be" | "none"
# "symbol"    = X per close, □ per zoom
# "classic_be"= stile iconico BeOS R4/R5
style        = "symbol"
scale        = 0.6        # Dimensione icona relativa al pulsante  (0.4–0.9)
stroke_width = 1.5        # Spessore linea icona in pixel

# ─── Colori pulsante Close ────────────────────────────────────────────────────
[buttons.close]
color_normal  = "#c0392b"
color_hover   = "#e74c3c"
color_pressed = "#922b21"
icon_color    = "#ffffff"

# ─── Colori pulsante Zoom/Maximize ────────────────────────────────────────────
[buttons.zoom]
color_normal  = "#27ae60"
color_hover   = "#2ecc71"
color_pressed = "#1e8449"
icon_color    = "#ffffff"

# ─── Effetto hover ────────────────────────────────────────────────────────────
# type: "lighten" | "darken" | "glow" | "scale" | "none"
[buttons.hover_effect]
type         = "lighten"
scale_factor = 1.08       # Solo se type="scale"


# ═══════════════════════════════════════════════════════════════════════════════
#  ANGOLO DI RIDIMENSIONAMENTO
# ═══════════════════════════════════════════════════════════════════════════════

[resize_corner]
# style: "knob" | "lines" | "none"
style = "knob"
size  = 18              # Area in pixel
color = ""              # Vuoto = eredita da border.active.color_base


# ═══════════════════════════════════════════════════════════════════════════════
#  TITOLO
# ═══════════════════════════════════════════════════════════════════════════════

[title]
# alignment: "left" | "center" | "right"
alignment    = "center"
shadow       = false
shadow_color = "#00000044"
# truncation: "end" | "middle"
truncation   = "end"


# ═══════════════════════════════════════════════════════════════════════════════
#  FINESTRE FLOATING  (pannelli, palette strumenti)
# ═══════════════════════════════════════════════════════════════════════════════

[floating]
tab_height   = 14           # Tab più sottile per finestre floating
border_width = 3
tab_color    = ""           # Vuoto = usa tab.inactive automaticamente


# ═══════════════════════════════════════════════════════════════════════════════
#  RENDERING
# ═══════════════════════════════════════════════════════════════════════════════

[rendering]
scale_with_dpi = true       # Scala i pixel con il DPI del display
min_tab_height = 16         # Tab mai sotto questa soglia
